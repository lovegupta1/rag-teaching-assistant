<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Teaching Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user-message {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: rgba(255,255,255,0.1);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            outline: none;
        }

        input::placeholder { color: rgba(255,255,255,0.4); }

        button {
            padding: 14px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        .typing {
            color: rgba(255,255,255,0.5);
            font-style: italic;
            font-size: 13px;
            padding: 5px 10px;
        }

        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 RAG Teaching Assistant</h1>
        <p class="subtitle">Video content se seedha jawab pao!</p>

        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Namaste! 👋 Mujhse video ke baare mein kuch bhi pucho!
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Kuch bhi pucho video ke baare mein..."
                onkeypress="handleKey(event)"
            />
            <button onclick="sendMessage()">Send 🚀</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const question = input.value.trim();
            if (!question) return;

            // User message
            chatBox.innerHTML += `<div class="message user-message">${question}</div>`;
            input.value = "";

            // Typing indicator
            chatBox.innerHTML += `<div class="typing" id="typing">Soch raha hoon... ⏳</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();

                // Remove typing
                document.getElementById("typing").remove();

                // Bot message
                chatBox.innerHTML += `<div class="message bot-message">${data.answer}</div>`;
            } catch (err) {
                document.getElementById("typing").remove();
                chatBox.innerHTML += `<div class="message bot-message">Error aa gaya! Dobara try karo.</div>`;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>
